<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TuPedido!</title>
  <meta
    name="description"
    content="TuPedido!. Sistema de pedidos por WhatsApp para negocios de comida."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- SPLASH -->
  <div id="splash" class="splash-screen" aria-hidden="true">
    <div class="splash-step splash-step-logo active" id="splashLogoStep">
      <img src="img/logo/logo4.png" alt="TuPedido" class="splash-logo" />
    </div>

    <div class="splash-step splash-step-text" id="splashTextStep">
      <h1 class="splash-question">¿Qué vas a pedir hoy?</h1>
    </div>
  </div>

  <div class="app-shell">
    <header id="topbar" class="topbar">
      <button id="backButton" class="icon-button hidden" aria-label="Volver">
        ←
      </button>

      <div class="topbar-brand">
        <div id="topbarLogo" class="topbar-logo"></div>

        <div class="topbar-brand-text">
          <span id="topbarStoreName" class="store-name">TuPedido</span>
          <span id="topbarStoreSubtitle" class="store-subtitle">Pedidos por WhatsApp</span>
        </div>
      </div>

      <div id="topbarRightSpacer" class="topbar-right-spacer"></div>
    </header>

    <main id="appView" class="main-content"></main>
  </div>

  <div id="cartBar" class="cart-bar hidden">
    <button id="cartButton" class="cart-bar-button">
      <span>Ver mi pedido</span>
      <strong id="cartTotal">$0</strong>
    </button>
  </div>

  <!-- MODAL RESUMEN FINAL -->
  <div id="confirmModal" class="modal hidden">
    <div class="modal-backdrop" data-close-modal></div>

    <div class="modal-card">
      <div class="modal-head">
        <h3>Antes de enviar</h3>
        <button class="modal-close" id="closeModalButton" type="button">×</button>
      </div>

      <p class="modal-text">
        Revisá tu pedido. Cuando confirmes, se abrirá WhatsApp con todo listo para enviar.
      </p>

      <div class="modal-preview" id="modalPreview"></div>

      <label class="check-row">
        <input type="checkbox" id="confirmCheck" />
        <span>Gracias por tu pedido. Confirmo que quiero enviarlo por WhatsApp.</span>
      </label>

      <div class="modal-actions">
        <button class="secondary-button" id="cancelModalButton" type="button">
          Cancelar
        </button>
        <button class="whatsapp-button" id="confirmSendButton" type="button" disabled>
          Enviar por WhatsApp
        </button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
